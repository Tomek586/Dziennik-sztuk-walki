packages:
  - apps/*
  - packages/*

# Expo / React Native wymagają płaskiego układu zależności (jak npm/yarn).
# W pnpm 10+ to ustawienie czytane jest stąd, nie z .npmrc.
nodeLinker: hoisted
allowBuilds:
  esbuild: true
onlyBuiltDependencies:
  - esbuild
minimumReleaseAgeExclude:
  - '@expo/config-plugins@56.0.10'
  - '@expo/config-types@56.0.7'
  - expo-sharing@56.0.19
